<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品模块</title>
    <style>
        * {
            padding: 0;
            margin: 0;
        }

        a {
            text-decoration: none;
            color: black;
        }

        body {
            background-color: #f5f5f5;
        }

        .box {
            width: 300px;
            height: 500px;
            background-color: #fff;
            margin: 100px auto;
        }

        .box img {
            width: 100%;
        }

        .text {
            height: 70px;
            font-size: 15px;
            padding: 0 20px;
            margin-top: 20px;
        }

        .pj {
            margin-top: 30px;
            font-size: 13px;
            padding: 0 20px;
            color: #c3bdbd;
        }

        .info {
            padding: 0 20px;
            margin-top: 10px;
        }

        h4 {
            display: inline;
            font-weight: 400;
        }

        .shuxian {
            color: gray;
            margin: 0 2px 0 10px;
        }

        .price {
            color: orange;
        }
    </style>
</head>

<body>
    <a href="#">
        <div class="box">
            <img src="图片.png">
            <p class="text">快递牛，整体不错蓝牙可以秒连接，红米给力</p>
            <p class="pj">来自于 119278479 的评价</p>
            <div class="info">
                <h4><a href="#">Redmi AirDots真无线蓝...</a></h4>
                <em class="shuxian">|</em>
                <span class="price">99.9元</span>
            </div>
        </div>
    </a>
</body>

</html>
