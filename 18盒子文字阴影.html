<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            width: 200px;
            height: 200px;
            background-color: pink;
            border-radius: 10%;
            box-shadow: 5px 5px 10px #ccc;
        }

        div:hover {
            box-shadow: 5px 5px 10px blue;
        }

        p {
            text-shadow: 5px 5px 10px #999;
        }
    </style>
</head>

<body>
    <div></div>
    <p>这是一个段落</p>
</body>

</html>
