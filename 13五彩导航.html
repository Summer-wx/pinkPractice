<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a {
            display: inline-block;
            width: 120px;
            height: 58px;
            background-color: rgb(221, 249, 10);
            text-align: center;
            line-height: 48px;
            color: white;
            text-decoration: none;
        }

        .bg1 {
            background: url(bg1.png) no-repeat;
        }

        .bg1:hover {
            background-image: url(bg11.png);
        }

        .bg2 {
            background: url(bg4.png);
        }

        .bg2:hover {
            background-image: url(bg22.png);
        }

        .bg3 {
            background: url(bg5.png);
        }

        .bg3:hover {
            background-image: url(bg1.png);
        }

        .bg4 {
            background: url(bg11.png);
        }

        .bg4:hover {
            background-image: url(bg4.png);
        }

        .bg5 {
            background: url(bg22.png);
        }

        .bg5:hover {
            background-image: url(bg5.png);
        }
    </style>
</head>

<body>
    <div>
        <a href="#" class="bg1">五彩导航</a>
        <a href="#" class="bg2">五彩导航</a>
        <a href="#" class="bg3">五彩导航</a>
        <a href="#" class="bg4">五彩导航</a>
        <a href="#" class="bg5">五彩导航</a>
    </div>
</body>

</html>
